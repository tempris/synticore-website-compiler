        var token = document.getElementById('token');
        var submit = document.getElementById('submit');
        var error = document.getElementById('error');

        function syncSubmitState() {
            submit.disabled = !String(token.value || '').trim();
        }

        async function authenticate() {
            if (submit.disabled) return;
            submit.disabled = true;
            error.hidden = true;
            error.textContent = '';

            try {
                var response = await fetch('/api/auth', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token: token.value })

                var payload = await response.json().catch(function () {
                    return {};
                });

                if (!response.ok || payload.ok === false) {
                    throw new Error(String(payload.message || 'Authentication failed.'));
                }

                window.location.href = '/';
            } catch (authError) {
                error.textContent = String(authError && authError.message || authError);
                error.hidden = false;
                syncSubmitState();
            }
        }

        token.addEventListener('input', syncSubmitState);
        submit.addEventListener('click', authenticate);
        token.addEventListener('keydown', function (event) {
            if (event.key !== 'Enter') return;

        });
