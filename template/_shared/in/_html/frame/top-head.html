<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta http-equiv="X-UA-Compatible" content="ie=edge">

<meta name="format-detection" content="telephone=no">
<meta name="format-detection" content="date=no">
<meta name="format-detection" content="address=no">
<meta name="format-detection" content="email=no">

<meta name="HandheldFriendly" content="true" />
<meta name="theme-color" content="[[CONFIG_CUSTOM_BRAND_COLOR]]"/>

@@if (context.title) {
  <title>@@title - [[CONFIG_REQUIRE_SITE_TITLE]]</title>
  <meta property="og:site_name" content="@@title - [[CONFIG_REQUIRE_SITE_TITLE]]"/>
  <meta property="og:title" content="@@title - [[CONFIG_REQUIRE_SITE_TITLE]]"/>
}
@@else {
  <title>[[AUTOMATIC_TITLE_FULL]]</title>
  <meta property="og:site_name" content="[[AUTOMATIC_TITLE_FULL]]"/>
  <meta property="og:title" content="[[AUTOMATIC_TITLE_FULL]]"/>
}

<meta name="description" content="[[CONFIG_CUSTOM_BRAND_SLOGAN]]">
<link rel="canonical" href="[[AUTOMATIC_PAGE_URL]]"/>

<meta property="og:type" content="website"/>
<meta property="og:url" content="[[AUTOMATIC_PAGE_URL]]"/>
<meta property="og:description" content="[[CONFIG_CUSTOM_BRAND_SLOGAN]]"/>
<meta property="og:image" content="/asset/image/favicon/pagethumb.png"/>

<link rel="image_src" href="/asset/image/favicon/pagethumb.png" />
<link rel="manifest" href="/manifest.webmanifest">
