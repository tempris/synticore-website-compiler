@@include('_html/frame/top.html', {
  "title": "Profile Settings"
})

<section class="panel panel--wide">
  <h1>Profile Settings</h1>
  <p>Edit account profile, preferences, and notification settings.</p>

  <form class="app-form" action="#" method="post">
    <label>
      Display Name
      <input type="text" name="display_name" placeholder="Jane Doe">
    </label>

    <label>
      Email
      <input type="email" name="email" placeholder="jane@example.com">
    </label>

    <label>
      Bio
      <textarea name="bio" rows="5" placeholder="Short profile description"></textarea>
    </label>

    <div class="hero-actions">
      <button type="submit" class="button">Save Changes</button>
      <button type="button" class="button button--ghost">Cancel</button>
    </div>
  </form>
</section>

@@include('_html/frame/bottom.html')
